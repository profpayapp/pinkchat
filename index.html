<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinkChat - Connect Live</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
  body{background:linear-gradient(135deg,#ff9a9e,#fad0c4);min-height:100vh;color:#333}
  .container{max-width:1200px;margin:0 auto;padding:20px}
  .login-box{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.1);max-width:400px;margin:100px auto;text-align:center}
  .login-box h1{color:#ff6b9d;margin-bottom:20px}
  .login-box input{width:100%;padding:12px;margin:10px 0;border:2px solid #fad0c4;border-radius:10px}
  .btn{background:linear-gradient(135deg,#ff6b9d,#ff9a9e);color:white;border:none;padding:12px 30px;border-radius:10px;cursor:pointer;font-weight:bold;width:100%;margin-top:10px}
  .btn:hover{opacity:0.9}
  .dashboard{display:none}
  .header{display:flex;justify-content:space-between;align-items:center;background:white;padding:15px;border-radius:15px;margin-bottom:20px}
  .chat-box{background:white;border-radius:15px;padding:20px;height:400px;overflow-y:auto;margin-bottom:20px}
  .msg{margin:10px 0;padding:10px;border-radius:10px;max-width:70%}
  .me{background:#ff6b9d;color:white;margin-left:auto}
  .them{background:#f0f0f0}
  .chat-input{display:flex;gap:10px}
  .chat-input input{flex:1;padding:12px;border:2px solid #fad0c4;border-radius:10px}
  .live-btn{background:#ff4757;color:white;padding:15px;border-radius:15px;text-align:center;cursor:pointer;margin-top:20px;font-weight:bold}
  .video-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:20px}
  video{background:black;border-radius:15px;width:100%}
</style>
</head>
<body>
<div class="container">
  
  <!-- LOGIN SCREEN -->
  <div id="login" class="login-box">
    <h1>💗 PinkChat</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
    <button class="btn" onclick="signup()" style="background:#ccc;color:#333">Sign Up</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="dashboard">
    <div class="header">
      <h2>Welcome to PinkChat</h2>
      <button class="btn" onclick="logout()" style="width:auto">Logout</button>
    </div>

    <!-- CHAT SECTION -->
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="Type message..." onkeypress="if(event.key==='Enter')sendMsg()">
      <button class="btn" onclick="sendMsg()" style="width:auto">Send</button>
    </div>

    <!-- VIDEO LIVE -->
    <div class="live-btn" onclick="startLive()">🔴 GO LIVE</div>
    <div class="video-grid" id="videoGrid"></div>
  </div>

</div>

<script type="module">
  // YOUR FIREBASE CONFIG
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, push, onChildAdded, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCDEpSOucQ-ndn0EiTse8r0765LdJtnsBU",
    authDomain: "pinkchat-56bdf.firebaseapp.com",
    databaseURL: "https://pinkchat-56bdf-default-rtdb.firebaseio.com",
    projectId: "pinkchat-56bdf",
    storageBucket: "pinkchat-56bdf.firebasestorage.app",
    messagingSenderId: "445551411546",
    appId: "1:445551411546:web:8075d12382eb1065923363",
    measurementId: "G-ZPJ06V7ECM"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUser = null;

  // AUTH
  window.login = () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, email, password)
    .catch(err => alert(err.message));
  }

  window.signup = () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    createUserWithEmailAndPassword(auth, email, password)
    .catch(err => alert(err.message));
  }

  window.logout = () => signOut(auth);

  onAuthStateChanged(auth, user => {
    if(user){
      currentUser = user;
      document.getElementById('login').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadMessages();
    } else {
      document.getElementById('login').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }
  });

  // CHAT
  function loadMessages(){
    const chatRef = ref(db, 'messages');
    onChildAdded(chatRef, (data) => {
      const msg = data.val();
      const div = document.createElement('div');
      div.className = 'msg ' + (msg.uid === currentUser.uid ? 'me' : 'them');
      div.innerText = msg.text;
      document.getElementById('chatBox').appendChild(div);
      document.getElementById('chatBox').scrollTop = 999999;
    });
  }

  window.sendMsg = () => {
    const text = document.getElementById('msgInput').value;
    if(text.trim() === '') return;
    push(ref(db, 'messages'), {
      text: text,
      uid: currentUser.uid,
      time: Date.now()
    });
    document.getElementById('msgInput').value = '';
  }

  // VIDEO LIVE - Basic WebRTC
  window.startLive = async () => {
    const video = document.createElement('video');
    video.autoplay = true;
    video.muted = true;
    document.getElementById('videoGrid').appendChild(video);
    const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
    video.srcObject = stream;
    alert('You are LIVE! Share this link with friends to join.');
  }

</script>
</body>
</html>
